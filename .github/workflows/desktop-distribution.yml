name: Desktop Distribution

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            dist_script: dist:mac
            artifact_name: reindeer-chopper-macos
            artifact_path: src-tauri/target/release/bundle/dmg/*.dmg
          - os: windows-latest
            dist_script: dist:win
            artifact_name: reindeer-chopper-windows
            artifact_path: |
              src-tauri/target/release/bundle/nsis/*.exe
              src-tauri/target/release/bundle/msi/*.msi

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Validate macOS release signing secrets
        if: matrix.os == 'macos-latest' && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          missing=()
          for name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID KEYCHAIN_PASSWORD; do
            if [[ -z "${!name}" ]]; then
              missing+=("$name")
            fi
          done

          if (( ${#missing[@]} )); then
            echo "::error::Missing macOS signing secrets: ${missing[*]}"
            exit 1
          fi

      - name: Import macOS signing certificate
        if: matrix.os == 'macos-latest' && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          certificate_path="$RUNNER_TEMP/developer-id.p12"
          keychain_path="$RUNNER_TEMP/reindeer-chopper-signing.keychain-db"

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$certificate_path"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security import "$certificate_path" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$keychain_path"
          security list-keychains -d user -s "$keychain_path"
          security default-keychain -s "$keychain_path"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$keychain_path"

          signing_identity="$(security find-identity -v -p codesigning "$keychain_path" | awk -F '"' '/Developer ID Application/ { print $2; exit }')"
          if [[ -z "$signing_identity" ]]; then
            security find-identity -v -p codesigning "$keychain_path"
            echo "::error::No Developer ID Application signing identity found in APPLE_CERTIFICATE"
            exit 1
          fi

          echo "APPLE_SIGNING_IDENTITY=$signing_identity" >> "$GITHUB_ENV"
          echo "MACOS_SIGNING_KEYCHAIN=$keychain_path" >> "$GITHUB_ENV"

      - name: Build desktop bundle
        env:
          APPLE_CERTIFICATE: ${{ matrix.os == 'macos-latest' && startsWith(github.ref, 'refs/tags/v') && secrets.APPLE_CERTIFICATE || '' }}
          APPLE_CERTIFICATE_PASSWORD: ${{ matrix.os == 'macos-latest' && startsWith(github.ref, 'refs/tags/v') && secrets.APPLE_CERTIFICATE_PASSWORD || '' }}
          APPLE_ID: ${{ matrix.os == 'macos-latest' && startsWith(github.ref, 'refs/tags/v') && secrets.APPLE_ID || '' }}
          APPLE_PASSWORD: ${{ matrix.os == 'macos-latest' && startsWith(github.ref, 'refs/tags/v') && secrets.APPLE_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ matrix.os == 'macos-latest' && startsWith(github.ref, 'refs/tags/v') && secrets.APPLE_TEAM_ID || '' }}
        run: npm run ${{ matrix.dist_script }}

      - name: Verify notarized macOS DMG
        if: matrix.os == 'macos-latest' && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          shopt -s nullglob
          dmgs=(src-tauri/target/release/bundle/dmg/*.dmg)

          if (( ${#dmgs[@]} == 0 )); then
            echo "::error::No macOS DMG files were produced"
            exit 1
          fi

          for dmg in "${dmgs[@]}"; do
            codesign --verify --deep --strict --verbose=2 "$dmg"
            xcrun stapler validate "$dmg"
            spctl --assess --type open --context context:primary-signature --verbose=4 "$dmg"
          done

      - name: Cleanup macOS signing keychain
        if: always() && matrix.os == 'macos-latest' && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          if [[ -n "${MACOS_SIGNING_KEYCHAIN:-}" ]]; then
            security delete-keychain "$MACOS_SIGNING_KEYCHAIN" || true
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  release-assets:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-desktop
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            release-assets/**/*.dmg
            release-assets/**/*.exe
            release-assets/**/*.msi
